[tool.uv.workspace]
members = [
  "shared",
  "custom-notifications",
  "due-date",
]

[dependency-groups]
dev = [
  "copier==9.*",
  "flake8==7.3.*",
  "flake8-aaa==0.17.*",
  "flake8-pyproject==1.2.*",
  "mypy==2.1.*",
  "pre-commit==4.6.*",
  "pytest==9.1.*",
  "pytest-asyncio==1.4.*",
  "pytest-cov==7.1.*",
  "pytest-deadfixtures==3.1.*",
  "pytest-mock==3.15.*",
  "pytest-randomly==4.1.*",
  "pytest-xdist==3.8.*",
  "ruff==0.15.20",
  "wemake-python-styleguide==1.6.*",
]

[tool.ruff]
preview = true
line-length = 100
target-version = "py312"
output-format = "full"
extend-exclude = ["scripts/templates"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = [
  "A",
  "B",
  "C4",
  "C90",
  "COM",
  "D",
  "DTZ",
  "E",
  "ERA",
  "EXE",
  "F",
  "FBT",
  "FLY",
  "FURB",
  "G",
  "I",
  "ICN",
  "ISC",
  "LOG",
  "N",
  "PERF",
  "PIE",
  "PL",
  "PT",
  "PTH",
  "Q",
  "RET",
  "RSE",
  "RUF",
  "S",
  "SIM",
  "SLF",
  "SLOT",
  "T100",
  "TRY",
  "UP",
  "W",
  "YTT",
]
ignore = [
  "A005",
  "B904",
  "COM812",
  "D100",
  "D104",
  "D105",
  "D106",
  "D107",
  "D203",
  "D212",
  "D401",
  "D404",
  "D405",
  "ISC001",
  "ISC003",
  "PLR09",
  "PLR2004",
  "PLR6301",
  "PT011",
  "TRY003",
]
external = ["AAA", "WPS"]

[tool.ruff.lint.flake8-import-conventions]
banned-from = ["ast", "datetime"]
aliases = { datetime = "dt" }

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

[tool.ruff.lint.mccabe]
max-complexity = 6

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**/tests/**.py" = [
  "E306",
  "D101",
  "D102",
  "D103",
  "S101",
  "S104",
  "S105",
  "S106",
  "S108",
  "S404",
  "S603",
  "S607",
  "PLC2701",
  "SLF001",
]

[tool.pytest.ini_options]
testpaths = [
  "tests",
  "scripts/tests",
  "shared/tests",
  "custom-notifications/tests",
  "due-date/tests",
]
pythonpath = [
  ".",
]
addopts = "--cov=mpt_extension_contrib --cov-report=term-missing --cov-fail-under=95 --import-mode=importlib"
log_cli = false
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true
relative_files = true

[tool.coverage.report]
exclude_also = [
  "if __name__ == \"__main__\":",
  "raise NotImplementedError",
]
omit = [
  "__init__.py",
]

[tool.flake8]
allowed-domain-names = ["result"]
allowed-module-metadata = ["__all__"]
aaa_act_block_style = "large"
doctests = true
extend-ignore = ["WPS226"]
extend-exclude = [
  ".coverage",
  ".github",
  ".idea",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  "scripts/templates",
  "uv.lock",
  ".venv",
]
format = "wemake"
max-imports = 17
max-line-length = 100
select = ["AAA", "E999", "WPS"]
show-source = true
statistics = false
per-file-ignores = [
  "/*.py: WPS412",
  "*tests/**: WPS202, WPS211, WPS432",
]

[tool.mypy]
enable_error_code = [
  "truthy-bool",
  "truthy-iterable",
  "redundant-expr",
  "unused-awaitable",
  "ignore-without-code",
  "possibly-undefined",
  "redundant-self",
  "explicit-override",
  "mutable-override",
  "unimported-reveal",
  "deprecated",
]
exclude = ["tests", "scripts/templates"]
exclude_gitignore = true
explicit_package_bases = true
ignore_missing_imports = true
local_partial_types = true
mypy_path = [
  "shared",
  "custom-notifications",
  "due-date",
]
strict = true
warn_unreachable = true
