name: PR build and merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Detect affected packages
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mapfile -t files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          python scripts/detect_changed_packages.py --files "${files[@]}"

  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Validate repository structure
        run: python scripts/check_repository.py

  packages:
    needs: [changes, repository]
    if: needs.changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        # Each entry is {name}, derived by detect_changed_packages.py so new
        # modules need no workflow change.
        module: ${{ fromJSON(needs.changes.outputs.packages) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build dev image
        run: make build

      - name: Run checks and tests for the package
        run: make check-all pkg=${{ matrix.module.name }}

      - name: Stop containers
        if: always()
        run: make down

  sonar:
    needs: [repository]
    runs-on: ubuntu-latest
    env:
      # Single SonarCloud project for the whole repository. Configure the
      # SONAR_TOKEN secret to enable the scan; until then it is skipped.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
