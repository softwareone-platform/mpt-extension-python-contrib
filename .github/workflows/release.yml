name: Release

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "CSV of <module>=<version> (e.g. shared=1.2.0,due-date=2.0.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Prepare release matrix
        id: matrix
        run: python scripts/prepare_release.py --packages "${{ inputs.packages }}"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push the release tag and create the GitHub release
      id-token: write  # PyPI trusted publishing (scoped to this job only)
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Publish one module at a time, in the workspace's declared order, so a
      # shared dependency is on PyPI before any module that depends on it, and
      # the tag/release git pushes (MPT-22143) never race across runners.
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set the release version
        run: uv version --package "${{ matrix.distribution }}" --frozen "${{ matrix.version }}"

      - name: Build the distribution
        env:
          PACKAGE: ${{ matrix.package }}
          DISTRIBUTION: ${{ matrix.distribution }}
          VERSION: ${{ matrix.version }}
        run: |
          rm -rf "$PACKAGE/dist"
          uv build --no-sources --sdist --wheel --out-dir "$PACKAGE/dist" "$PACKAGE"
          normalized="${DISTRIBUTION//-/_}"
          test -f "$PACKAGE/dist/$normalized-$VERSION.tar.gz"
          test -f "$PACKAGE/dist/$normalized-$VERSION-py3-none-any.whl"

      - name: Create or verify the release tag
        env:
          TAG: ${{ matrix.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          target="$(git rev-parse HEAD)"
          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            test "$(git rev-list -n 1 "$TAG")" = "$target"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Publish to PyPI
        run: uv publish "${{ matrix.package }}"/dist/*

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ matrix.package }}
          DISTRIBUTION: ${{ matrix.distribution }}
          VERSION: ${{ matrix.version }}
          TAG: ${{ matrix.tag }}
        run: |
          previous="$(git tag --list "${PACKAGE}-[0-9]*" --sort=-version:refname | grep -v "^${TAG}$" | head -1)"
          range="${previous:+${previous}..HEAD}"
          {
            echo "## Changes in ${PACKAGE}"
            git log --reverse --format='- %s (`%h`)' ${range:-HEAD} -- "$PACKAGE" || true
          } > "$RUNNER_TEMP/notes.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PACKAGE"/dist/* --clobber
          else
            gh release create "$TAG" "$PACKAGE"/dist/* \
              --verify-tag \
              --title "$DISTRIBUTION v$VERSION" \
              --notes-file "$RUNNER_TEMP/notes.md" \
              --latest
          fi
