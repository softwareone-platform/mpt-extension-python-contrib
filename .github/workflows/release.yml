name: Release

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "CSV of <module>=<version> (e.g. shared=1.2.0,due-date=2.0.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Prepare release matrix
        id: matrix
        run: python scripts/prepare_release.py --packages "${{ inputs.packages }}"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # PyPI trusted publishing (scoped to this job only)
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Publish one module at a time, in the workspace's declared order, so a
      # shared dependency is on PyPI before any module that depends on it, and
      # the tag/release git pushes (MPT-22143) never race across runners.
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set the release version
        run: uv version --package "${{ matrix.distribution }}" --frozen "${{ matrix.version }}"

      - name: Build the distribution
        env:
          PACKAGE: ${{ matrix.package }}
          DISTRIBUTION: ${{ matrix.distribution }}
          VERSION: ${{ matrix.version }}
        run: |
          rm -rf "$PACKAGE/dist"
          uv build --no-sources --sdist --wheel --out-dir "$PACKAGE/dist" "$PACKAGE"
          normalized="${DISTRIBUTION//-/_}"
          test -f "$PACKAGE/dist/$normalized-$VERSION.tar.gz"
          test -f "$PACKAGE/dist/$normalized-$VERSION-py3-none-any.whl"

      - name: Publish to PyPI
        run: uv publish "${{ matrix.package }}"/dist/*
