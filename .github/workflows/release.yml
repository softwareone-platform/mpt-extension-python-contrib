name: Release

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "CSV of <module>=<version> (e.g. shared=1.2.0,due-date=2.0.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Prepare release matrix
        id: matrix
        run: python scripts/prepare_release.py --packages "${{ inputs.packages }}"
